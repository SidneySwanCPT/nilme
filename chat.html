  <style>
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

      height: 100vh;
      margin-top: var(--nav-height);
      height: calc(100vh - var(--nav-height));
    }

    /* Sidebar */
    .chat-sidebar {
      width: 280px;

      border-right: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-sidebar-header {
      padding: var(--space-lg);

      font-size: 1.3rem;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .chat-sidebar-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

      padding: var(--space-md);
      overflow-y: auto;

      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
      padding: 0 4px;
    }

    .topic-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 4px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: var(--font-body);
    }

    .topic-btn.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .topic-icon { font-size: 1rem; flex-shrink: 0; }

    .chat-sidebar-tools {
      padding: var(--space-md);
      border-top: 1px solid var(--border-color);
    }

    .sidebar-tool-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 0.78rem;
      text-decoration: none;
      transition: all 0.15s;

      flex-direction: column;
      overflow: hidden;
    }

      border-bottom: 1px solid var(--border-color);
      background: var(--bg-primary);

      align-items: center;
      gap: var(--space-md);
      flex-shrink: 0;

// ============================================
// CHAT STATE
// ============================================
let currentTopic = 'general';
let chatInstance = null;

function setTopic(topicKey, btn) {
  currentTopic = topicKey;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadTopic(topicKey);
}

function loadTopic(topicKey) {
  const t = TOPICS[topicKey];
  document.getElementById('topicIcon').textContent = t.icon;
  document.getElementById('topicTitle').textContent = t.title;
  document.getElementById('topicDesc').textContent = t.desc;

  // Suggestions
  const sugEl = document.getElementById('chatSuggestions');
  sugEl.innerHTML = '';
  t.suggestions.forEach(function(s) {
    const btn = document.createElement('button');
    btn.className = 'chat-suggestion';
    btn.textContent = s;
    btn.onclick = function() {
      if (chatInstance) {
        document.getElementById('c8input').value = s;
        window._c8SendMsg();
      }
    };
    sugEl.appendChild(btn);
  });

  // Build chat
  const container = document.getElementById('chatContainer');
  container.innerHTML = '';
  chatInstance = CAMP8_AI.buildChatUI({
    container,
    system: t.system,
    welcomeMsg: t.welcome,
    placeholder: 'Ask anything…',
    accentColor: t.accentColor,
  });
}

function newConversation() {
  if (chatInstance) chatInstance.reset();
}

// Boot — check URL for ?topic= param
document.addEventListener('DOMContentLoaded', function() {
  const params = new URLSearchParams(window.location.search);
  const topicParam = params.get('topic');
  const startTopic = (topicParam && TOPICS[topicParam]) ? topicParam : 'general';

  // Highlight correct sidebar button
  if (startTopic !== 'general') {
    document.querySelectorAll('.topic-btn').forEach(function(btn) {
      btn.classList.remove('active');
      if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("'" + startTopic + "'")) {
        btn.classList.add('active');
      }
    });
  }

  loadTopic(startTopic);
});
