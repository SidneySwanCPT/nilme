# ============================================
# Camp 8 — Netlify Configuration
# ============================================

[build]
  functions = "netlify/functions"

# ---- Scheduled Functions ----
[functions."news-scanner"]
  schedule = "0 8 * * *"

# Weekly pattern-detect — Mondays 11:00 UTC. Proposes trend/modifier
# changes as status='pending' rows in detected_patterns. Admins review.
[functions."pattern-detect"]
  schedule = "0 11 * * 1"

# ---- Redirects ----
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200


[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
